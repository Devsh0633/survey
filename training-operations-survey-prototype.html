<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Operations Maturity Assessment — Prototype</title>
<style>
  :root {
    --primary: #1e3a8a;
    --accent: #06b6d4;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px 16px 60px;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 560px; }
  .logo {
    font-weight: 700;
    font-size: 18px;
    color: var(--primary);
    margin-bottom: 20px;
  }
  .logo span { color: var(--accent); }
  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.25s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 24px;
  }
  .eyebrow {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
  }
  h2 {
    font-size: 19px;
    margin: 0 0 18px;
    line-height: 1.4;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  label.opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  label.opt:hover { border-color: var(--accent); background: #f0fdff; }
  label.opt.selected { border-color: var(--accent); background: #ecfeff; }
  label.opt input { accent-color: var(--accent); }
  textarea, input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .other-box { margin-top: 10px; }
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #1e2f6e; }
  .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--muted); }
  .btn-secondary:hover { color: var(--text); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .branch-tag {
    display: inline-block;
    font-size: 11px;
    background: #ecfeff;
    color: var(--primary);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .summary-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .summary-item strong { display: block; color: var(--muted); font-weight: 500; margin-bottom: 3px; }
  .summary-item span { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Simpli<span>Train</span> — Training Operations Maturity Assessment (prototype)</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Question 1 of 14</div>
  <div class="card" id="card"></div>
</div>

<script>
const state = { answers: {}, step: 0 };

// ---- Branch content ----
const roleBranches = {
  leadership: [
    { id:'q9', title:'On average, how many hours per week does your team spend on manual training admin — scheduling, chasing instructors, compiling reports?', type:'single',
      options:['Under 5','5–15','15–30','30–50','50+'] },
    { id:'q10', title:'Roughly what does your organization spend annually on training technology and tools?', type:'single',
      options:['Under $5,000','$5,000–$20,000','$20,000–$50,000','$50,000–$150,000','$150,000+','Not sure'] },
    { id:'q11', title:'Are you planning to invest in new training technology in the next 12 months?', type:'single',
      options:['Yes, actively evaluating options','Yes, but not urgent','No plans currently','Not sure yet'] }
  ],
  id: [
    { id:'q9', title:'How many hours per week do you spend on tasks that could be automated or sped up — reformatting content, manually building assessments, adapting material for different delivery formats?', type:'single',
      options:['Under 2','2–5','5–10','10–20','20+'] },
    { id:'q10', title:'What\'s your primary content authoring tool today?', type:'single',
      options:['Built-in LMS authoring tool','Articulate (Storyline/Rise)','Adobe Captivate','PowerPoint converted to e-learning','AI-assisted authoring tool','No dedicated authoring tool','Other'] },
    { id:'q11', title:'Are you looking for better authoring or AI-assisted content tools in the next 12 months?', type:'single',
      options:['Yes, actively looking','Yes, but not a priority right now','Happy with current tools','Not sure'] }
  ],
  trainer: [
    { id:'q9', title:'On average, how many hours per week do you personally spend on manual training admin — scheduling, chasing instructors, compiling reports, entering the same data twice?', type:'single',
      options:['Under 2','2–5','5–10','10–20','20+'] },
    { id:'q10', title:'Do you feel you have the tools you need to do your job well?', type:'single',
      options:['Yes, fully equipped','Mostly, with some gaps','Some gaps that slow me down regularly','No, I\'m working around serious limitations daily'] },
    { id:'q11', title:'Do you think your organization will invest in better training tools in the next 12 months?', type:'single',
      options:['Very likely','Somewhat likely','Unlikely','Not sure — not my call'] }
  ],
  consultant: [
    { id:'q9', title:'How many hours per week do you spend on business admin — invoicing, chasing registrations, scheduling — instead of actually training?', type:'single',
      options:['Under 2','2–5','5–10','10–20','20+'] },
    { id:'q10', title:'Roughly how much do you spend annually on tools to run your training business — platform, scheduling, payments, etc.?', type:'single',
      options:['Under $1,000','$1,000–$5,000','$5,000–$15,000','$15,000–$50,000','$50,000+','Not sure'] },
    { id:'q11', title:'Are you planning to invest in new tools for your training business in the next 12 months?', type:'single',
      options:['Yes, actively evaluating options','Yes, but not urgent','No plans currently','Not sure yet'] }
  ]
};
roleBranches.other = roleBranches.leadership; // fallback per spec

const industryBranches = {
  healthcare: [
    { id:'q12', title:'How do you track mandatory clinical/compliance certifications — licensure renewals, infection control, patient safety?', type:'single',
      options:['Dedicated system w/ alerts','LMS module','Spreadsheet','Manual','No formal system'] },
    { id:'q13', title:'How much of your training is driven by external regulatory or accreditation requirements?', type:'single',
      options:['Almost all','More than half','About half','Less than half','Very little'] }
  ],
  banking: [
    { id:'q12', title:'Is your training plan built from a formal Training Needs Analysis, or set some other way?', type:'single',
      options:['Formal annual TNA','Informal/ad hoc','Compliance-mandated only','No formal plan'] },
    { id:'q13', title:'Which compliance training area eats the most time?', type:'multi',
      options:['AML/CTF','Data privacy','Risk management','Regulatory updates','Customer standards','Other'] }
  ],
  manufacturing: [
    { id:'q12', title:'How do you track safety certifications — forklift, hazmat, equivalent — across your workforce?', type:'single',
      options:['Dedicated system w/ expiry alerts','LMS module','Spreadsheet','Paper-based','Not formally tracked'] },
    { id:'q13', title:'How many physical locations does your training program need to cover?', type:'single',
      options:['1','2–5','6–15','16+'] }
  ],
  tech: [
    { id:'q12', title:'Does your training budget go mostly toward internal upskilling, or customer/partner education?', type:'single',
      options:['Mostly internal','Mostly customer-facing','Roughly even','Don\'t separate'] },
    { id:'q13', title:'Do you run any formal certification programs for customers or partners?', type:'single',
      options:['Yes, formal','Informal','Not currently'] }
  ],
  energy: [
    { id:'q12', title:'Are you subject to any government-mandated licensing requirements for training providers or trainees?', type:'single',
      options:['Yes','No','Not sure'] },
    { id:'q13', title:'How do you manage credentialing for specialized or hazardous-work training?', type:'single',
      options:['Dedicated system','LMS module','Spreadsheet','Not formally tracked'] }
  ],
  aviation: [
    { id:'q12', title:'How do you track recurrent training and certification requirements for flight, cabin, or maintenance crew?', type:'single',
      options:['Dedicated system w/ expiry alerts','LMS module','Spreadsheet','Manual','No formal system'] },
    { id:'q13', title:'How much of your training is driven by aviation regulatory bodies (FAA, EASA, CAA, or equivalent)?', type:'single',
      options:['Almost all','More than half','About half','Less than half','Very little'] }
  ],
  government: [
    { id:'q12', title:'How does your organization track training completion across multiple departments or agencies?', type:'single',
      options:['Centralized system','Each department separately','Manual/spreadsheet','No consistent method'] },
    { id:'q13', title:'Are data privacy or records-retention rules a major factor in choosing training systems?', type:'single',
      options:['Major factor','Somewhat','Not really','Not applicable'] }
  ],
  training: [
    { id:'q12', title:'Does your organization deliver training as a revenue-generating service to external clients?', type:'single',
      options:['Yes, primary business','Yes, secondary revenue','No, internal only'] },
    { id:'q13', title:'How do you currently handle scheduling and invoicing for client-facing sessions?', type:'single',
      options:['Dedicated TMS','Manual/spreadsheets','Mix of tools','Not applicable'] }
  ],
  retail: [
    { id:'q12', title:'How do you manage training for a high-turnover, frontline or seasonal workforce?', type:'single',
      options:['Standardized onboarding','Ad hoc','Varies by location','This is a real struggle'] },
    { id:'q13', title:'How many locations does your training program need to reach?', type:'single',
      options:['1','2–10','11–50','50+'] }
  ],
  other: [
    { id:'q12', title:'How much of your training is driven by external compliance, licensing, or regulatory requirements?', type:'single',
      options:['Almost all of it','More than half','About half','Less than half','Very little'] },
    { id:'q13', title:'Who is most of your training built for?', type:'multi',
      options:['New hire onboarding','Ongoing employee upskilling','Customer or partner education','Regulatory or compliance certification','Leadership development'] }
  ]
};

const industryKeyMap = {
  'Healthcare & Life Sciences':'healthcare','Financial Services & Banking':'banking','Manufacturing':'manufacturing',
  'Technology & Software':'tech','Energy & Utilities':'energy','Aviation':'aviation','Government & Public Sector':'government',
  'Professional Training & Consulting':'training','Retail & Hospitality':'retail','Other':'other'
};
const roleKeyMap = {
  'Director / VP / Team Lead / Training Operations Manager':'leadership',
  'Instructional Designer / Content Developer':'id',
  'Trainer / Training Specialist / Coordinator':'trainer',
  'Independent Consultant / Freelance Trainer':'consultant',
  'Other':'other'
};

// ---- Base question list (q1,q2,q3 branching triggers; q4-q8 shared; q14 closer) ----
const baseQuestions = [
  { id:'q1', title:'What industry are you in?', type:'single', other:true,
    options:['Healthcare & Life Sciences','Financial Services & Banking','Manufacturing','Technology & Software','Energy & Utilities','Aviation','Government & Public Sector','Professional Training & Consulting','Retail & Hospitality','Other'] },
  { id:'q2', title:'Which best describes your role?', type:'single',
    options:['Director / VP / Team Lead / Training Operations Manager','Instructional Designer / Content Developer','Trainer / Training Specialist / Coordinator','Independent Consultant / Freelance Trainer','Other'] },
  { id:'q3', title:'How large is your organization (total employees)?', type:'single',
    options:['Under 100','100–500','501–2,000','2,001–10,000','10,000+'] },
  { id:'q4', title:'How many people work in your L&D/training team?', type:'single',
    options:['Just me','2–5','6–15','16–50','50+'] },
  { id:'q5', title:'How do you deliver most of your training?', type:'multi',
    options:['Instructor-led classroom','Virtual ILT','Hybrid','Self-paced e-learning','Microlearning','On-demand video'] },
  { id:'q6', title:'Roughly how many training sessions or courses does your team run per month?', type:'single',
    options:['Fewer than 5','5–20','21–50','51–150','150+'] },
  { id:'q7', title:'Which of these do you currently use to manage training?', type:'multi',
    options:['Standalone LMS','Standalone scheduling or TMS tool','Unified LMS + TMS platform','Spreadsheets or manual tracking','CRM integration','HRIS integration','AI-powered authoring tools','None of the above — mostly ad hoc'] },
  { id:'q8', title:'What\'s the single biggest bottleneck in running your training program right now?', type:'single',
    options:['Scheduling & coordination','Instructor or trainer management','Compliance & certification tracking','Reporting & visibility','Budget constraints','Content creation','Learner engagement or completion','Scaling across locations'] }
];
const closingQuestion = { id:'q14', title:'What\'s one feature you wish your training platform had, or that you feel is missing from what\'s available today?', type:'text', optional:true };
const contactQuestion = { id:'contact', title:'Where should we send your results?', type:'contact' };

function buildFullFlow() {
  const roleKey = roleKeyMap[state.answers.q2] || 'leadership';
  const industryKey = industryKeyMap[state.answers.q1] || 'other';
  return [...baseQuestions, ...roleBranches[roleKey], ...industryBranches[industryKey], closingQuestion, contactQuestion];
}

function currentQuestion() {
  // q1-q3 always resolvable directly; q9+ needs q1/q2 known, which they are by then
  const flow = buildFullFlow();
  return flow[state.step];
}

function render() {
  const flow = buildFullFlow();
  const q = flow[state.step];
  const total = flow.length;
  document.getElementById('progressFill').style.width = ((state.step) / (total - 1) * 100) + '%';
  document.getElementById('progressLabel').textContent = `Question ${state.step + 1} of ${total}`;

  const card = document.getElementById('card');
  let branchTag = '';
  if (['q9','q10','q11'].includes(q.id)) {
    branchTag = `<div class="branch-tag">Role branch: ${state.answers.q2}</div>`;
  } else if (['q12','q13'].includes(q.id)) {
    branchTag = `<div class="branch-tag">Industry branch: ${state.answers.q1}</div>`;
  }

  let bodyHTML = '';
  if (q.type === 'single') {
    bodyHTML = `<div class="options">` + q.options.map(opt => {
      const checked = state.answers[q.id] === opt ? 'checked' : '';
      const sel = state.answers[q.id] === opt ? 'selected' : '';
      return `<label class="opt ${sel}"><input type="radio" name="${q.id}" value="${opt}" ${checked} onchange="selectSingle('${q.id}','${opt.replace(/'/g,"\\'")}')"> ${opt}</label>`;
    }).join('') + `</div>`;
    if (q.other) {
      const showOther = state.answers[q.id] === 'Other';
      bodyHTML += `<div class="other-box" style="display:${showOther ? 'block':'none'}"><input type="text" id="otherText" placeholder="What industry are you in?" value="${state.answers.q1_other || ''}" oninput="state.answers.q1_other=this.value"></div>`;
    }
  } else if (q.type === 'multi') {
    const selected = state.answers[q.id] || [];
    bodyHTML = `<div class="options">` + q.options.map(opt => {
      const checked = selected.includes(opt) ? 'checked' : '';
      const sel = selected.includes(opt) ? 'selected' : '';
      return `<label class="opt ${sel}"><input type="checkbox" value="${opt}" ${checked} onchange="toggleMulti('${q.id}','${opt.replace(/'/g,"\\'")}')"> ${opt}</label>`;
    }).join('') + `</div>`;
  } else if (q.type === 'text') {
    bodyHTML = `<textarea rows="4" placeholder="Optional — your thoughts help shape the report" oninput="state.answers['${q.id}']=this.value">${state.answers[q.id] || ''}</textarea><div class="hint">Optional — you can submit without answering this.</div>`;
  } else if (q.type === 'contact') {
    bodyHTML = `
      <div class="options" style="gap:14px">
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;">Full name</label>
          <input type="text" placeholder="Jane Smith" value="${state.answers.contactName || ''}" oninput="state.answers.contactName=this.value; validateContact()">
        </div>
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;">Organization / company name</label>
          <input type="text" placeholder="Acme Training Co." value="${state.answers.contactOrg || ''}" oninput="state.answers.contactOrg=this.value; validateContact()">
        </div>
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;">Work email</label>
          <input type="text" placeholder="jane@company.com" value="${state.answers.contactEmail || ''}" oninput="state.answers.contactEmail=this.value; validateContact()">
          <div class="hint" style="margin-top:4px;">We'll also accept a personal email if that's easier.</div>
        </div>
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px;">Country</label>
          <input type="text" placeholder="United States" value="${state.answers.contactCountry || ''}" oninput="state.answers.contactCountry=this.value; validateContact()">
        </div>
      </div>
      <div class="hint">This unlocks your free Training Operations Health Check — we'll send a copy of your responses and your code here.</div>
    `;
  }

  const isLast = state.step === total - 1;
  card.innerHTML = `
    ${branchTag}
    <h2>${q.title}</h2>
    ${bodyHTML}
    <div class="nav">
      <button class="btn-secondary" onclick="goBack()" ${state.step === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
      <button class="btn-primary" id="nextBtn" onclick="${isLast ? 'showSummary()' : 'goNext()'}">${isLast ? 'Submit' : 'Next →'}</button>
    </div>
  `;
  updateNextEnabled(q);
}

function selectSingle(id, val) { state.answers[id] = val; render(); }
function toggleMulti(id, val) {
  if (!state.answers[id]) state.answers[id] = [];
  const idx = state.answers[id].indexOf(val);
  if (idx > -1) state.answers[id].splice(idx, 1); else state.answers[id].push(val);
  render();
}
function updateNextEnabled(q) {
  const btn = document.getElementById('nextBtn');
  if (q.type === 'contact') { validateContact(); return; }
  if (q.optional) { btn.disabled = false; return; }
  if (q.type === 'text') { btn.disabled = false; return; }
  if (q.type === 'multi') { btn.disabled = !(state.answers[q.id] && state.answers[q.id].length > 0); return; }
  btn.disabled = !state.answers[q.id];
}
function validateContact() {
  const btn = document.getElementById('nextBtn');
  const a = state.answers;
  const emailOk = a.contactEmail && /\S+@\S+\.\S+/.test(a.contactEmail);
  btn.disabled = !(a.contactName && a.contactName.trim() && a.contactOrg && a.contactOrg.trim() && emailOk && a.contactCountry && a.contactCountry.trim());
}
function goNext() { state.step++; render(); }
function goBack() { state.step--; render(); }

function showSummary() {
  const flow = buildFullFlow();
  const card = document.getElementById('card');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Complete';
  const code = 'SIMPLI-' + Math.random().toString(36).substring(2,8).toUpperCase();
  let rows = flow.filter(q => q.type !== 'contact').map(q => {
    let val = state.answers[q.id];
    if (q.id === 'q1' && val === 'Other') val = state.answers.q1_other || '(not specified)';
    if (Array.isArray(val)) val = val.join(', ');
    return `<div class="summary-item"><strong>${q.title}</strong><span>${val || '(skipped)'}</span></div>`;
  }).join('');
  card.innerHTML = `
    <div class="eyebrow">Prototype output — this is what gets captured, and what would get emailed</div>
    <h2>Thanks, ${state.answers.contactName || 'there'} — you're all set</h2>
    <div class="summary-item"><strong>Organization</strong><span>${state.answers.contactOrg || ''}</span></div>
    <div class="summary-item"><strong>Results will be sent to</strong><span>${state.answers.contactEmail || ''} (${state.answers.contactCountry || ''})</span></div>
    <div class="summary-item"><strong>Free Training Operations Health Check code</strong><span>${code} — simulated for this prototype, valid 60 days in the real version</span></div>
    ${rows}
    <div class="nav"><button class="btn-secondary" onclick="restart()">↺ Restart prototype</button><span></span></div>
  `;
}
function restart() { state.answers = {}; state.step = 0; render(); }

render();
</script>
</body>
</html>
